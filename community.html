<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SDP Community</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#151515;
padding:15px;
display:flex;
justify-content:space-between;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
background:#ff3d5a;
color:white;
cursor:pointer;
}

.postimg{
width:100%;
border-radius:8px;
margin-top:10px;
}

.username{
color:#4da3ff;
font-weight:bold;
}

.like{
cursor:pointer;
font-size:20px;
}

.like.red{
color:red;
}

.authbox{
max-width:350px;
margin:80px auto;
background:#1c1c1c;
padding:25px;
border-radius:12px;
}

</style>

</head>

<body>

<header>
<h2>SDP Community</h2>
<button id="logout">Logout</button>
</header>

<div id="auth" class="authbox">

<h3>Login / Signup</h3>

<input id="username" placeholder="username (signup only)">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</div>

<div id="app" style="display:none">

<div class="container">

<div class="card">

<h3>Create Post</h3>

<input id="title" placeholder="title">
<input type="file" id="image">

<button onclick="createPost()">Upload</button>

</div>

<div id="feed"></div>

</div>

</div>

<script>

const supabase = supabase.createClient(
"postgresql://postgres:[YOUR-PASSWORD]@db.evcpqywmsueshdelhtrr.supabase.co:5432/postgres",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2Y3BxeXdtc3Vlc2hkZWxodHJyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MTI0OTMsImV4cCI6MjA4ODk4ODQ5M30.mg7BYbVYixYp5h1qRB57eccHypDMpuc_j6ZKJELOMSU"
)

async function signup(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let username=document.getElementById("username").value

if(username!==username.toLowerCase()){
alert("username must be lowercase")
return
}

const {data,error}=await supabase.auth.signUp({
email:email,
password:password
})

if(error){alert(error.message);return}

await supabase.from("users").insert({
id:data.user.id,
username:username
})

alert("account created")

}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

const {error}=await supabase.auth.signInWithPassword({
email:email,
password:password
})

if(error){alert(error.message)}

checkUser()

}

async function checkUser(){

const {data}=await supabase.auth.getUser()

if(data.user){

document.getElementById("auth").style.display="none"
document.getElementById("app").style.display="block"

loadPosts()

}

}

checkUser()

document.getElementById("logout").onclick=async()=>{

await supabase.auth.signOut()
location.reload()

}

async function compress(file){

return new Promise(resolve=>{

let img=new Image()
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

img.onload=()=>{

canvas.width=600
canvas.height=img.height*(600/img.width)

ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.7))

}

img.src=URL.createObjectURL(file)

})

}

async function createPost(){

let title=document.getElementById("title").value
let file=document.getElementById("image").files[0]

let img=await compress(file)

const {data}=await supabase.auth.getUser()

let user=await supabase
.from("users")
.select("username")
.eq("id",data.user.id)
.single()

await supabase.from("posts").insert({
title:title,
image:img,
username:user.data.username,
likes:[]
})

loadPosts()

}

async function loadPosts(){

let feed=document.getElementById("feed")
feed.innerHTML=""

let {data}=await supabase
.from("posts")
.select("*")
.order("created_at",{ascending:false})

data.forEach(p=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="username">${p.username}</div>
<div>${p.title}</div>

<img src="${p.image}" class="postimg">

<div>

<span class="like" onclick="likePost('${p.id}')">❤</span>
${p.likes.length} likes

</div>

<input placeholder="comment" onkeypress="if(event.key==='Enter')comment('${p.id}',this.value,this)">

<div id="c${p.id}"></div>

`

feed.appendChild(div)

loadComments(p.id)

})

}

async function likePost(id){

const {data}=await supabase.auth.getUser()

let {data:post}=await supabase
.from("posts")
.select("likes")
.eq("id",id)
.single()

let likes=post.likes||[]

if(!likes.includes(data.user.id))
likes.push(data.user.id)

await supabase
.from("posts")
.update({likes:likes})
.eq("id",id)

loadPosts()

}

async function comment(id,text,input){

const {data}=await supabase.auth.getUser()

let user=await supabase
.from("users")
.select("username")
.eq("id",data.user.id)
.single()

await supabase.from("comments").insert({
post_id:id,
username:user.data.username,
text:text
})

input.value=""

loadComments(id)

}

async function loadComments(id){

let {data}=await supabase
.from("comments")
.select("*")
.eq("post_id",id)

let box=document.getElementById("c"+id)

if(!box)return

box.innerHTML=""

data.forEach(c=>{

let d=document.createElement("div")
d.innerText=c.username+": "+c.text
box.appendChild(d)

})

}

</script>

</body>
</html>
