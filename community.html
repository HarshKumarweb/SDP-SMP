<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SDP Community</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#151515;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.auth-container{
display:flex;
justify-content:center;
align-items:center;
height:90vh;
padding:15px;
}

.auth-box{
background:#1c1c1c;
padding:25px;
border-radius:12px;
width:360px;
max-width:100%;
}

.auth-box input{
width:100%;
padding:10px;
margin-top:10px;
background:#2a2a2a;
border:none;
border-radius:6px;
color:white;
}

.auth-box button{
width:100%;
padding:11px;
margin-top:15px;
background:#ff3d5a;
border:none;
border-radius:6px;
color:white;
font-size:15px;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:12px;
font-size:14px;
color:#aaa;
cursor:pointer;
}

.error{
background:#ff3d5a;
padding:10px;
border-radius:6px;
margin-top:12px;
display:none;
}

.container{
max-width:900px;
margin:auto;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

.card input{
width:100%;
padding:10px;
margin-top:10px;
background:#2a2a2a;
border:none;
border-radius:6px;
color:white;
}

.card button{
margin-top:10px;
padding:10px 15px;
background:#ff3d5a;
border:none;
border-radius:6px;
color:white;
}

.username{
color:#4da3ff;
font-weight:bold;
}

img{
width:100%;
border-radius:8px;
margin-top:10px;
}

.actions{
margin-top:10px;
display:flex;
gap:15px;
align-items:center;
}

.like{
font-size:20px;
cursor:pointer;
}

.like.red{
color:red;
}

.comment{
background:#2a2a2a;
padding:6px;
border-radius:5px;
margin-top:6px;
font-size:14px;
}

@media(max-width:600px){

.auth-box{
padding:20px;
}

header{
font-size:19px;
}

}

</style>
</head>

<body>

<header>SDP Community</header>

<div id="authArea" class="auth-container">

<div class="auth-box">

<h3 id="authTitle">Login</h3>

<input id="username" placeholder="username (signup only)">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password">

<button id="authBtn">Login</button>

<div class="switch" id="switchMode">
Don't have account? Sign up
</div>

<div class="error" id="authError"></div>

</div>

</div>

<div id="app" style="display:none">

<div class="container">

<div class="card">

<h3>Create Post</h3>

<input id="title" placeholder="Post title">
<input type="file" id="image">

<button onclick="createPost()">Upload</button>

</div>

<div id="feed"></div>

</div>

</div>


<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDeuo2H8bqMJeQaKhHyZRJyCWCRtBYzF5w",
  authDomain: "sdp-smp-login.firebaseapp.com",
  projectId: "sdp-smp-login",
  storageBucket: "sdp-smp-login.firebasestorage.app",
  messagingSenderId: "16457314138",
  appId: "1:16457314138:web:0224bd327811d3080b8d63"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.firestore();
const storage=firebase.storage();

let signup=false;

const username=document.getElementById("username");
const email=document.getElementById("email");
const password=document.getElementById("password");

username.style.display="none";

document.getElementById("switchMode").onclick=()=>{

signup=!signup

if(signup){

document.getElementById("authTitle").innerText="Sign Up"
document.getElementById("authBtn").innerText="Create Account"
document.getElementById("switchMode").innerText="Already have account? Login"
username.style.display="block"

}else{

document.getElementById("authTitle").innerText="Login"
document.getElementById("authBtn").innerText="Login"
document.getElementById("switchMode").innerText="Don't have account? Sign up"
username.style.display="none"

}

}

document.getElementById("authBtn").onclick=async()=>{

let e=email.value
let p=password.value
let u=username.value

const error=document.getElementById("authError")
error.style.display="none"

if(signup){

if(u!==u.toLowerCase()){
error.innerText="Username must be lowercase"
error.style.display="block"
return
}

if(p.length<8){
error.innerText="Password must be at least 8 characters"
error.style.display="block"
return
}

let check=await db.collection("usernames").doc(u).get()

if(check.exists){
error.innerText="Username already taken"
error.style.display="block"
return
}

try{

let cred=await auth.createUserWithEmailAndPassword(e,p)

await db.collection("users").doc(cred.user.uid).set({
username:u
})

await db.collection("usernames").doc(u).set({
uid:cred.user.uid
})

}catch(err){
error.innerText=err.message
error.style.display="block"
}

}else{

try{

await auth.signInWithEmailAndPassword(e,p)

}catch{
error.innerText="Invalid login"
error.style.display="block"
}

}

}

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById("authArea").style.display="none"
document.getElementById("app").style.display="block"

loadPosts()

}

})

async function compress(file){

return new Promise(res=>{

let img=new Image()
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

img.onload=()=>{

let max=900
let scale=max/img.width

canvas.width=max
canvas.height=img.height*scale

ctx.drawImage(img,0,0,canvas.width,canvas.height)

canvas.toBlob(blob=>{
res(blob)
},"image/jpeg",0.7)

}

img.src=URL.createObjectURL(file)

})

}

async function createPost(){

let title=document.getElementById("title").value
let file=document.getElementById("image").files[0]

if(!file)return

let blob=await compress(file)

let ref=storage.ref("posts/"+Date.now()+".jpg")

await ref.put(blob)

let url=await ref.getDownloadURL()

let user=auth.currentUser
let udoc=await db.collection("users").doc(user.uid).get()

await db.collection("posts").add({

title:title,
image:url,
username:udoc.data().username,
likes:[],
comments:[],
time:Date.now()

})

loadPosts()

}

async function loadPosts(){

let feed=document.getElementById("feed")
feed.innerHTML=""

let snap=await db.collection("posts").orderBy("time","desc").get()

snap.forEach(doc=>{

let p=doc.data()
let id=doc.id

let liked=p.likes.includes(auth.currentUser.uid)

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="username">${p.username}</div>
<div>${p.title}</div>

<img src="${p.image}">

<div class="actions">

<span class="like ${liked?"red":""}" onclick="likePost('${id}')">❤</span>

<span>${p.likes.length} likes</span>
<span>${p.comments.length} comments</span>

</div>

<input placeholder="comment..." onkeypress="if(event.key==='Enter')commentPost('${id}',this.value,this)">

<div id="c_${id}"></div>

`

feed.appendChild(div)

p.comments.forEach(c=>{

let el=document.createElement("div")
el.className="comment"
el.innerText=c.username+": "+c.text

div.querySelector("#c_"+id).appendChild(el)

})

})

}

async function likePost(id){

let ref=db.collection("posts").doc(id)

await ref.update({
likes:firebase.firestore.FieldValue.arrayUnion(auth.currentUser.uid)
})

loadPosts()

}

async function commentPost(id,text,input){

if(!text)return

let user=auth.currentUser
let udoc=await db.collection("users").doc(user.uid).get()

await db.collection("posts").doc(id).update({

comments:firebase.firestore.FieldValue.arrayUnion({
username:udoc.data().username,
text:text
})

})

input.value=""

loadPosts()

}

</script>

</body>
</html>
