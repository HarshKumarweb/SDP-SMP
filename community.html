<!DOCTYPE html><html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1"><title>SDP Community</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#151515;
padding:12px 18px;
display:flex;
justify-content:space-between;
align-items:center;
}

h2{margin:0}

.logout{
background:#ff3d5a;
border:none;
padding:6px 10px;
font-size:12px;
border-radius:6px;
cursor:pointer;
display:none;
}

.container{
max-width:800px;
margin:auto;
padding:15px;
}

.card{
background:#1c1c1c;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#ff3d5a;
color:white;
}

.authbox{
max-width:350px;
margin:80px auto;
background:#1c1c1c;
padding:25px;
border-radius:12px;
}

.switch{
text-align:center;
margin-top:12px;
font-size:14px;
color:#aaa;
cursor:pointer;
}

.postimg{
width:100%;
border-radius:8px;
margin-top:10px;
}

.username{
color:#4da3ff;
font-weight:bold;
}

.like{
cursor:pointer;
font-size:20px;
}

.comment{
font-size:14px;
margin-top:4px;
}

</style></head><body><header>
<h2>SDP Community</h2>
<button id="logoutBtn" class="logout">Logout</button>
</header><div id="auth" class="authbox"><h3 id="authTitle">Login</h3><input id="username" placeholder="username (signup only)" style="display:none">
<input id="email" placeholder="email">
<input id="password" type="password" placeholder="password"><button id="mainAuthBtn">Login</button>

<div class="switch" id="switchAuth">
Don't have an account? Sign up
</div></div><div id="app" style="display:none"><div class="container"><div class="card"><h3>Create Post</h3><input id="title" placeholder="post title"><input type="file" id="image"><button onclick="createPost()">Upload Post</button>

</div><div id="feed"></div></div></div><script>

const { createClient } = supabase

const db = createClient(
"YOUR_SUPABASE_URL",
"YOUR_SUPABASE_ANON_KEY"
)

let signupMode=false

const usernameInput=document.getElementById("username")
const authTitle=document.getElementById("authTitle")
const mainBtn=document.getElementById("mainAuthBtn")
const switchAuth=document.getElementById("switchAuth")

switchAuth.onclick=()=>{

signupMode=!signupMode

if(signupMode){

authTitle.innerText="Sign Up"
mainBtn.innerText="Create Account"
usernameInput.style.display="block"
switchAuth.innerText="Already have account? Login"

}else{

authTitle.innerText="Login"
mainBtn.innerText="Login"
usernameInput.style.display="none"
switchAuth.innerText="Don't have an account? Sign up"

}

}

mainBtn.onclick=()=>{

if(signupMode){
signup()
}else{
login()
}

}

async function signup(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value
let username=usernameInput.value

if(username!==username.toLowerCase()){
alert("Username must be lowercase")
return
}

if(password.length<8){
alert("Password must be 8 characters minimum")
return
}

const { data, error } = await db.auth.signUp({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

await db.from("users").insert({
id:data.user.id,
username:username
})

alert("Account created. Now login.")

}

async function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

const { error } = await db.auth.signInWithPassword({
email:email,
password:password
})

if(error){
alert(error.message)
return
}

checkUser()

}

async function checkUser(){

const { data } = await db.auth.getUser()

if(data.user){

document.getElementById("auth").style.display="none"
document.getElementById("app").style.display="block"
document.getElementById("logoutBtn").style.display="block"

loadPosts()

}

}

checkUser()

document.getElementById("logoutBtn").onclick=async()=>{

await db.auth.signOut()
location.reload()

}

function compress(file){

return new Promise(resolve=>{

let img=new Image()
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

img.onload=()=>{

canvas.width=600
canvas.height=img.height*(600/img.width)

ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.7))

}

img.src=URL.createObjectURL(file)

})

}

async function createPost(){

let title=document.getElementById("title").value
let file=document.getElementById("image").files[0]

if(!file)return

let image=await compress(file)

const { data } = await db.auth.getUser()

let user=await db
.from("users")
.select("username")
.eq("id",data.user.id)
.single()

await db.from("posts").insert({
title:title,
image:image,
username:user.data.username,
likes:[]
})

loadPosts()

}

async function loadPosts(){

let feed=document.getElementById("feed")
feed.innerHTML=""

let { data } = await db
.from("posts")
.select("*")
.order("created_at",{ascending:false})

data.forEach(post=>{

let div=document.createElement("div")
div.className="card"

div.innerHTML=`

<div class="username">${post.username}</div>
<div>${post.title}</div>

<img src="${post.image}" class="postimg">

<div>

<span class="like" onclick="likePost('${post.id}')">❤</span>
${post.likes.length} likes

</div>

<input placeholder="comment..." 
onkeypress="if(event.key==='Enter')commentPost('${post.id}',this.value,this)">

<div id="c${post.id}"></div>

`

feed.appendChild(div)

loadComments(post.id)

})

}

async function likePost(id){

const { data } = await db.auth.getUser()

let { data:post } = await db
.from("posts")
.select("likes")
.eq("id",id)
.single()

let likes=post.likes || []

if(!likes.includes(data.user.id)){
likes.push(data.user.id)
}

await db
.from("posts")
.update({likes:likes})
.eq("id",id)

loadPosts()

}

async function commentPost(id,text,input){

if(!text)return

const { data } = await db.auth.getUser()

let user=await db
.from("users")
.select("username")
.eq("id",data.user.id)
.single()

await db.from("comments").insert({
post_id:id,
username:user.data.username,
text:text
})

input.value=""

loadComments(id)

}

async function loadComments(id){

let { data } = await db
.from("comments")
.select("*")
.eq("post_id",id)

let box=document.getElementById("c"+id)

if(!box)return

box.innerHTML=""

data.forEach(c=>{

let div=document.createElement("div")
div.className="comment"
div.innerText=c.username+": "+c.text

box.appendChild(div)

})

}

</script></body>
  </html>
