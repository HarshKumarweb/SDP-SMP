<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SDP SMP Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #00ffcc;
}

.logo{
font-size:20px;
font-weight:bold;
color:#00ffcc;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
}

nav a:hover{
color:#00ffcc;
}

main{
flex:1;
padding:40px 20px;
max-width:900px;
margin:auto;
width:100%;
}

.card{
background:#121212;
border:1px solid #00ffcc33;
padding:25px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px #00ffcc22;
}

h2{
margin-top:0;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#0f0f0f;
border:1px solid #00ffcc44;
color:white;
border-radius:6px;
}

button{
margin-top:12px;
padding:12px;
width:100%;
border:none;
background:#00ffcc;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#00ddb0;
}

.rank{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
background:#0f0f0f;
padding:15px;
border-radius:6px;
}

.rank button{
width:auto;
padding:8px 16px;
}

footer{
background:#111;
text-align:center;
padding:10px;
border-top:1px solid #00ffcc;
}

@media(max-width:600px){

.rank{
flex-direction:column;
align-items:flex-start;
}

.rank button{
margin-top:10px;
width:100%;
}

}

</style>

</head>
<body>

<header>

<div class="logo">SDP SMP</div>

<nav>
<a href="index.html">Dashboard</a>
<a href="store.html">Store</a>
<a href="tos.html">TOS</a>
<a href="faq.html">FAQ</a>
</nav>

</header>

<main>

<div class="card">

<h2>Login</h2>

<input id="username" placeholder="Enter Minecraft Username">

<button onclick="generateLink()">Generate Link Code</button>

<p id="codeDisplay"></p>

<button onclick="loginPlayer()">Login</button>

</div>

<div id="storePanel" class="card" style="display:none">

<h2>Player Panel</h2>

<p>Player: <span id="playerName"></span></p>
<p>Balance: <span id="balance"></span></p>
<p>Rank: <span id="rank"></span></p>

<button onclick="logout()">Logout</button>

</div>

<div id="rankStore" class="card" style="display:none">

<h2>Ranks</h2>

<div class="rank">
<div>VIP Rank</div>
<div>200 Coins</div>
<button onclick="buyRank('VIP',200)">Buy</button>
</div>

<div class="rank">
<div>MVP Rank</div>
<div>500 Coins</div>
<button onclick="buyRank('MVP',500)">Buy</button>
</div>

</div>

</main>

<footer>
© 2026 SDP SMP
</footer>


<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

// =====================
// FIREBASE CONFIG
// =====================

const firebaseConfig = {
  apiKey: "AIzaSyDeuo2H8bqMJeQaKhHyZRJyCWCRtBYzF5w",
  authDomain: "sdp-smp-login.firebaseapp.com",
  projectId: "sdp-smp-login",
  storageBucket: "sdp-smp-login.firebasestorage.app",
  messagingSenderId: "16457314138",
  appId: "1:16457314138:web:0224bd327811d3080b8d63"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();


// =====================
// GENERATE LINK CODE
// =====================

async function generateLink(){

const username = document.getElementById("username").value.trim();

if(username===""){
alert("Enter username");
return;
}

const code = Math.random().toString(36).substring(2,8).toUpperCase();

try{

await db.collection("links").doc(code).set({

username:username,
linked:false,
created:Date.now()

});

document.getElementById("codeDisplay").innerText =
"Run /link " + code + " in Minecraft chat";

}catch(err){

console.error(err);
alert("Failed to generate code");

}

}


// =====================
// LOGIN PLAYER
// =====================
 
// =====================

function logout(){

localStorage.removeItem("sdp_user");

location.reload();

}


// =====================
// BUY RANK
// =====================

async function buyRank(rankName,price){

const username=localStorage.getItem("sdp_user");

if(!username){

alert("Login first");
return;

}

const playerRef=db.collection("players").doc(username);

const doc=await playerRef.get();

if(!doc.exists){

alert("Player not found");
return;

}

const data=doc.data();

if(data.balance<price){

alert("Not enough balance");
return;

}

const newBalance=data.balance-price;

await playerRef.update({

balance:newBalance,
prefix:rankName

});

document.getElementById("balance").innerText=newBalance;
document.getElementById("rank").innerText=rankName;

alert("Rank purchased!");

}

</script>

</body>
</html>
