<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDP SMP Store</title>

<style>
/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* PAGE STRUCTURE */
body{
font-family:Segoe UI, Arial, sans-serif;
background:#0b0b0b;
color:#e6e6e6;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAVBAR */
.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:#111;
border-bottom:1px solid #1e1e1e;
flex-wrap:wrap;
}
.logo-area{
display:flex;
align-items:center;
gap:10px;
}
.logo{
width:38px;
height:38px;
}
nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}
nav a{
text-decoration:none;
color:#bfbfbf;
transition:0.2s;
}
nav a:hover{
color:#00e5ff;
}

/* MAIN CONTENT */
main{
flex:1;
}
.container{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
padding:50px 20px;
}

/* CARDS */
.card{
background:#121212;
border:1px solid #1e1e1e;
border-radius:12px;
padding:25px;
width:300px;
transition:0.25s;
}
.card:hover{
border-color:#00e5ff;
box-shadow:0 0 12px rgba(0,229,255,0.18);
}
.card h2{
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
background:#0f0f0f;
border:1px solid #2a2a2a;
border-radius:6px;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#00e5ff;
color:black;
font-weight:600;
cursor:pointer;
transition:0.2s;
}
button:hover{
background:#00c7de;
}

/* FOOTER */
footer{
text-align:center;
padding:18px;
background:#111;
border-top:1px solid #1e1e1e;
color:#888;
margin-top:40px;
}

/* MOBILE */
@media(max-width:650px){
.navbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}
.card{
width:100%;
}
}
</style>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

</head>
<body>

<header class="navbar">
<div class="logo-area">
<img src="file_00000000dde8720babf6ee062ba581a8__1_-removebg-preview.png" class="logo">
<strong>SDP SMP</strong>
</div>

<nav>
<a href="index.html">Dashboard</a>
<a href="store.html">Store</a>
<a href="tos.html">TOS</a>
<a href="faq.html">FAQ</a>
</nav>
</header>

<main>
<div class="container">

<div class="card">
<h2>Login</h2>
<input id="username" placeholder="Minecraft Username">
<button onclick="generateLink()">Generate Link Code</button>
<p id="code"></p>
</div>

<div class="card" id="panel" style="display:none">
<h2>Player Panel</h2>
<p>Balance: <span id="balance"></span></p>
<p>Rank: <span id="rank"></span></p>
<button onclick="buyRank('VIP',200)">Buy VIP (200)</button>
<button onclick="buyRank('MVP',500)">Buy MVP (500)</button>
<button onclick="logout()">Logout</button>
</div>

</div>
</main>

<footer>
© 2026 SDP SMP
</footer>

<!-- COMBINED JAVASCRIPT -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>
<script>
// ==== FIREBASE CONFIG ====
const firebaseConfig = {
  apiKey: "AIzaSyDeuo2H8bqMJeQaKhHyZRJyCWCRtBYzF5w",
  authDomain: "sdp-smp-login.firebaseapp.com",
  projectId: "sdp-smp-login",
  storageBucket: "sdp-smp-login.firebasestorage.app",
  messagingSenderId: "16457314138",
  appId: "1:16457314138:web:0224bd327811d3080b8d63"
};
// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ==== HELPER FUNCTION: GENERATE CODE ====
function randomCode() {
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

// ==== GENERATE LINK ====
async function generateLink() {
  const username = document.getElementById("username").value.trim();
  if(!username){
    alert("Enter your Minecraft username!");
    return;
  }

  const code = randomCode();

  await db.collection("links").doc(code).set({
    username: username,
    linked: false,
    created: Date.now()
  });

  document.getElementById("code").innerText = "Run /link " + code + " in-game";
}

// ==== LOAD PLAYER DATA ====
async function loadPlayer(username) {
  const doc = await db.collection("players").doc(username).get();
  if(!doc.exists){
    alert("Player not linked yet.");
    return;
  }

  const data = doc.data();

  // Show panel
  document.getElementById("panel").style.display = "block";

  // Update balance & rank
  document.getElementById("balance").innerText = data.balance;
  document.getElementById("rank").innerText = data.prefix;

  // Save username in browser for persistent login
  localStorage.setItem("username", username);
}

// ==== BUY RANK / ITEM ====
async function buyRank(rank, price){
  const username = localStorage.getItem("username");
  if(!username){
    alert("You are not logged in!");
    return;
  }

  const playerRef = db.collection("players").doc(username);
  const snap = await playerRef.get();

  if(!snap.exists){
    alert("Player not linked yet.");
    return;
  }

  const data = snap.data();

  if(data.balance < price){
    alert("Not enough money!");
    return;
  }

  // Deduct balance
  await playerRef.update({
    balance: data.balance - price
  });

  // Add purchase request
  await db.collection("purchases").add({
    username: username,
    rank: rank,
    price: price,
    status: "pending",
    time: Date.now()
  });

  alert(`Purchased ${rank}! Check in-game for the applied rank.`);
  loadPlayer(username);
}

// ==== LOGOUT ====
function logout(){
  localStorage.removeItem("username");
  location.reload();
}

// ==== PERSISTENT LOGIN ====
window.onload = () => {
  const user = localStorage.getItem("username");
  if(user){
    loadPlayer(user);
  }
}
</script>

</body>
</html>
