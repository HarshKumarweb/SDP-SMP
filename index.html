<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* PAGE LAYOUT (fixes footer position) */

body{
font-family:Segoe UI, Arial, sans-serif;
background:#0b0b0b;
color:#e6e6e6;
min-height:100vh;
display:flex;
flex-direction:column;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 24px;
background:#111;
border-bottom:1px solid #1e1e1e;
flex-wrap:wrap;
}

.logo-area{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:38px;
height:38px;
}

.logo-title{
font-weight:600;
letter-spacing:1px;
}

nav{
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
text-decoration:none;
color:#bfbfbf;
font-size:15px;
transition:0.2s;
}

nav a:hover{
color:#00e5ff;
}

/* MAIN CONTENT */

main{
flex:1;
}

.container{
display:flex;
flex-wrap:wrap;
gap:30px;
justify-content:center;
padding:50px 20px;
}

/* CARDS */

.card{
background:#121212;
border:1px solid #1e1e1e;
border-radius:12px;
padding:25px;
width:300px;
transition:0.25s;
}

.card:hover{
border-color:#00e5ff;
box-shadow:0 0 12px rgba(0,229,255,0.18);
}

.card h2{
margin-bottom:15px;
}

ul{
padding-left:18px;
line-height:1.7;
color:#cfcfcf;
}

/* FOOTER */

footer{
text-align:center;
padding:18px;
background:#111;
border-top:1px solid #1e1e1e;
color:#888;
}

/* MOBILE */

@media(max-width:650px){

.navbar{
flex-direction:column;
align-items:flex-start;
gap:10px;
}

.card{
width:100%;
}

}

</style>
</head>

<body>

<header class="navbar">

<div class="logo-area">
<img src="file_00000000dde8720babf6ee062ba581a8__1_-removebg-preview.png" class="logo">

</div>

</div>
